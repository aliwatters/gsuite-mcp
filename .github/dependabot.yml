version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      go-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # v0 modules treat 0.X -> 0.Y as semver "minor" but the API can break
      # arbitrarily across those bumps. Pin manually for these so the
      # weekly minor/patch grouped PR doesn't silently land a breaking change.
      - dependency-name: "github.com/mark3labs/mcp-go"
        update-types: ["version-update:semver-minor"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
